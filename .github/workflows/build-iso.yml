name: Build OllamaLinux ISO

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'ISO flavor to build'
        required: true
        default: 'server'
        type: choice
        options:
          - server
          - desktop
          - both
      models:
        description: 'Comma-separated models to preload (e.g. llama3.2:1b,nomic-embed-text). Leave empty to skip.'
        required: false
        default: ''
        type: string

jobs:
  build-server:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.flavor == 'server' ||
      github.event.inputs.flavor == 'both'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed \
            shim-signed mtools dosfstools squashfs-tools \
            syslinux-utils isolinux

      - name: Prepare build
        run: |
          cd live-build

          # Copy scripts into chroot overlay
          mkdir -p config/includes.chroot/usr/local/bin/lib
          cp -r ../scripts/*.sh config/includes.chroot/usr/local/bin/ 2>/dev/null || true
          cp -r ../scripts/lib/*.sh config/includes.chroot/usr/local/bin/lib/ 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/*.sh 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/lib/*.sh 2>/dev/null || true

          # Rename scripts (remove .sh extension for cleaner CLI)
          for f in config/includes.chroot/usr/local/bin/*.sh; do
            [ -f "$f" ] && mv "$f" "${f%.sh}"
          done

          # Copy branding
          if [ -d ../branding/grub ]; then
            mkdir -p config/includes.binary/boot/grub/themes/ollamalinux/
            cp ../branding/grub/* config/includes.binary/boot/grub/themes/ollamalinux/ 2>/dev/null || true
          fi

          if [ -d ../branding/plymouth ]; then
            mkdir -p config/includes.chroot/usr/share/plymouth/themes/ollamalinux/
            cp -r ../branding/plymouth/* config/includes.chroot/usr/share/plymouth/themes/ollamalinux/ 2>/dev/null || true
          fi

          chmod +x config/hooks/*.hook.chroot 2>/dev/null || true

          # Remove desktop packages for server build
          rm -f config/package-lists/desktop.list.chroot
          rm -f config/package-lists/installer.list.chroot

      - name: Build Server ISO
        env:
          PRELOAD_MODELS: ${{ github.event.inputs.models || '' }}
        run: |
          cd live-build
          chmod +x auto/*

          # Create local syslinux bootloader template with real files (not broken symlinks)
          mkdir -p config/bootloaders
          cp -a /usr/share/live/build/bootloaders/isolinux config/bootloaders/
          # Replace symlinks with real binary files
          cp -fL /usr/lib/ISOLINUX/isolinux.bin config/bootloaders/isolinux/ 2>/dev/null || true
          cp -fL /usr/lib/syslinux/modules/bios/vesamenu.c32 config/bootloaders/isolinux/ 2>/dev/null || true
          cp -fL /usr/lib/syslinux/modules/bios/ldlinux.c32 config/bootloaders/isolinux/ 2>/dev/null || true
          cp -fL /usr/lib/syslinux/modules/bios/libcom32.c32 config/bootloaders/isolinux/ 2>/dev/null || true
          cp -fL /usr/lib/syslinux/modules/bios/libutil.c32 config/bootloaders/isolinux/ 2>/dev/null || true
          # Remove broken symlinks and obsolete files
          find config/bootloaders/isolinux/ -xtype l -delete 2>/dev/null || true
          rm -f config/bootloaders/isolinux/splash.svg.in
          # Create empty bootlogo cpio if missing
          if [ ! -e config/bootloaders/isolinux/bootlogo ]; then
            (cd /tmp && ls -d . | cpio --quiet -o) > config/bootloaders/isolinux/bootlogo
          fi

          # Patch genisoimage 4GB limit (squashfs exceeds 4GB)
          LB_ISO="/usr/lib/live/build/lb_binary_iso"
          if [ -f "$LB_ISO" ]; then
            sudo sed -i '/^\s*genisoimage\s/s/genisoimage/genisoimage -allow-limited-size/' "$LB_ISO"
            sudo sed -i '/Chroot.*genisoimage\s/s/genisoimage/genisoimage -allow-limited-size/' "$LB_ISO"
          fi

          sudo lb config
          sudo lb build 2>&1 | tee build.log

          # Verify ISO was produced
          ls -lh *.iso binary.hybrid.iso 2>/dev/null || { echo "ERROR: No ISO produced"; exit 1; }

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-server-log
          path: live-build/build.log
          retention-days: 7

      - name: Collect output
        run: |
          mkdir -p output
          VERSION=$(cat VERSION)
          sudo mv live-build/*.iso output/ollamalinux-${VERSION}-server-amd64.iso 2>/dev/null || \
            sudo mv live-build/binary.iso output/ollamalinux-${VERSION}-server-amd64.iso 2>/dev/null || true
          sudo chown -R runner:runner output/
          cd output && sha256sum *.iso > SHA256SUMS 2>/dev/null || true
          ls -lh .

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollamalinux-server-iso
          path: |
            output/*.iso
            output/SHA256SUMS
          retention-days: 30

  build-desktop:
    if: >-
      github.event.inputs.flavor == 'desktop' ||
      github.event.inputs.flavor == 'both'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed \
            shim-signed mtools dosfstools squashfs-tools \
            syslinux-utils isolinux

      - name: Prepare build
        run: |
          cd live-build

          mkdir -p config/includes.chroot/usr/local/bin/lib
          cp -r ../scripts/*.sh config/includes.chroot/usr/local/bin/ 2>/dev/null || true
          cp -r ../scripts/lib/*.sh config/includes.chroot/usr/local/bin/lib/ 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/*.sh 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/lib/*.sh 2>/dev/null || true

          for f in config/includes.chroot/usr/local/bin/*.sh; do
            [ -f "$f" ] && mv "$f" "${f%.sh}"
          done

          if [ -d ../branding/grub ]; then
            mkdir -p config/includes.binary/boot/grub/themes/ollamalinux/
            cp ../branding/grub/* config/includes.binary/boot/grub/themes/ollamalinux/ 2>/dev/null || true
          fi

          if [ -d ../branding/plymouth ]; then
            mkdir -p config/includes.chroot/usr/share/plymouth/themes/ollamalinux/
            cp -r ../branding/plymouth/* config/includes.chroot/usr/share/plymouth/themes/ollamalinux/ 2>/dev/null || true
          fi

          chmod +x config/hooks/*.hook.chroot 2>/dev/null || true

      - name: Build Desktop ISO
        env:
          PRELOAD_MODELS: ${{ github.event.inputs.models || '' }}
        run: |
          cd live-build
          chmod +x auto/*

          # Create local syslinux bootloader template (same as server build)
          mkdir -p config/bootloaders
          cp -a /usr/share/live/build/bootloaders/isolinux config/bootloaders/
          cp -fL /usr/lib/ISOLINUX/isolinux.bin config/bootloaders/isolinux/ 2>/dev/null || true
          cp -fL /usr/lib/syslinux/modules/bios/vesamenu.c32 config/bootloaders/isolinux/ 2>/dev/null || true
          cp -fL /usr/lib/syslinux/modules/bios/ldlinux.c32 config/bootloaders/isolinux/ 2>/dev/null || true
          cp -fL /usr/lib/syslinux/modules/bios/libcom32.c32 config/bootloaders/isolinux/ 2>/dev/null || true
          cp -fL /usr/lib/syslinux/modules/bios/libutil.c32 config/bootloaders/isolinux/ 2>/dev/null || true
          find config/bootloaders/isolinux/ -xtype l -delete 2>/dev/null || true
          rm -f config/bootloaders/isolinux/splash.svg.in
          if [ ! -e config/bootloaders/isolinux/bootlogo ]; then
            (cd /tmp && ls -d . | cpio --quiet -o) > config/bootloaders/isolinux/bootlogo
          fi

          # Patch genisoimage 4GB limit
          LB_ISO="/usr/lib/live/build/lb_binary_iso"
          if [ -f "$LB_ISO" ]; then
            sudo sed -i '/^\s*genisoimage\s/s/genisoimage/genisoimage -allow-limited-size/' "$LB_ISO"
            sudo sed -i '/Chroot.*genisoimage\s/s/genisoimage/genisoimage -allow-limited-size/' "$LB_ISO"
          fi

          sudo lb config
          sudo lb build 2>&1 | tee build.log

          # Verify ISO was produced
          ls -lh *.iso binary.hybrid.iso 2>/dev/null || { echo "ERROR: No ISO produced"; exit 1; }

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-desktop-log
          path: live-build/build.log
          retention-days: 7

      - name: Collect output
        run: |
          mkdir -p output
          VERSION=$(cat VERSION)
          sudo mv live-build/*.iso output/ollamalinux-${VERSION}-desktop-amd64.iso 2>/dev/null || \
            sudo mv live-build/binary.iso output/ollamalinux-${VERSION}-desktop-amd64.iso 2>/dev/null || true
          sudo chown -R runner:runner output/
          cd output && sha256sum *.iso > SHA256SUMS 2>/dev/null || true
          ls -lh .

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollamalinux-desktop-iso
          path: |
            output/*.iso
            output/SHA256SUMS
          retention-days: 30

  build-arm64:
    # Disabled: ARM64 requires native runner (Oracle Cloud self-hosted planned for v0.2.0)
    if: false
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Install live-build and QEMU cross-build support
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso \
            mtools dosfstools squashfs-tools \
            qemu-user-static binfmt-support

      - name: Prepare build
        run: |
          cd live-build

          # Copy scripts into chroot overlay
          mkdir -p config/includes.chroot/usr/local/bin/lib
          cp -r ../scripts/*.sh config/includes.chroot/usr/local/bin/ 2>/dev/null || true
          cp -r ../scripts/lib/*.sh config/includes.chroot/usr/local/bin/lib/ 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/*.sh 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/lib/*.sh 2>/dev/null || true

          # Rename scripts (remove .sh extension for cleaner CLI)
          for f in config/includes.chroot/usr/local/bin/*.sh; do
            [ -f "$f" ] && mv "$f" "${f%.sh}"
          done

          if [ -d ../branding/grub ]; then
            mkdir -p config/includes.binary/boot/grub/themes/ollamalinux/
            cp ../branding/grub/* config/includes.binary/boot/grub/themes/ollamalinux/ 2>/dev/null || true
          fi

          if [ -d ../branding/plymouth ]; then
            mkdir -p config/includes.chroot/usr/share/plymouth/themes/ollamalinux/
            cp -r ../branding/plymouth/* config/includes.chroot/usr/share/plymouth/themes/ollamalinux/ 2>/dev/null || true
          fi

          chmod +x config/hooks/*.hook.chroot 2>/dev/null || true

          # Remove desktop packages for server build
          rm -f config/package-lists/desktop.list.chroot
          rm -f config/package-lists/installer.list.chroot

      - name: Build ARM64 Server ISO
        env:
          ARCH: arm64
          PRELOAD_MODELS: ${{ github.event.inputs.models || '' }}
        run: |
          cd live-build
          chmod +x auto/*

          # Patch genisoimage 4GB limit
          LB_ISO="/usr/lib/live/build/lb_binary_iso"
          if [ -f "$LB_ISO" ]; then
            sudo sed -i '/^\s*genisoimage\s/s/genisoimage/genisoimage -allow-limited-size/' "$LB_ISO"
            sudo sed -i '/Chroot.*genisoimage\s/s/genisoimage/genisoimage -allow-limited-size/' "$LB_ISO"
          fi

          sudo ARCH=arm64 lb config
          sudo lb build 2>&1 | tee build.log

          # Verify ISO was produced
          ls -lh *.iso binary.iso 2>/dev/null || { echo "ERROR: No ISO produced"; exit 1; }

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-arm64-log
          path: live-build/build.log
          retention-days: 7

      - name: Collect output
        run: |
          mkdir -p output
          VERSION=$(cat VERSION)
          sudo mv live-build/*.iso output/ollamalinux-${VERSION}-server-arm64.iso 2>/dev/null || \
            sudo mv live-build/binary.iso output/ollamalinux-${VERSION}-server-arm64.iso 2>/dev/null || true
          sudo chown -R runner:runner output/
          cd output && sha256sum *.iso > SHA256SUMS 2>/dev/null || true
          ls -lh .

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollamalinux-arm64-iso
          path: |
            output/*.iso
            output/SHA256SUMS
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/SHA256SUMS
          generate_release_notes: true
