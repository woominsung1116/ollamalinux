name: Build OllamaLinux ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'ISO flavor to build'
        required: true
        default: 'server'
        type: choice
        options:
          - server
          - desktop
          - both

jobs:
  build-server:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.flavor == 'server' ||
      github.event.inputs.flavor == 'both'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed \
            shim-signed mtools dosfstools squashfs-tools syslinux \
            syslinux-utils isolinux genisoimage

      - name: Prepare build
        run: |
          cd live-build

          # Copy scripts into chroot overlay
          mkdir -p config/includes.chroot/usr/local/bin/lib
          cp -r ../scripts/*.sh config/includes.chroot/usr/local/bin/ 2>/dev/null || true
          cp -r ../scripts/lib/*.sh config/includes.chroot/usr/local/bin/lib/ 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/*.sh 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/lib/*.sh 2>/dev/null || true

          # Rename scripts (remove .sh extension for cleaner CLI)
          for f in config/includes.chroot/usr/local/bin/*.sh; do
            [ -f "$f" ] && mv "$f" "${f%.sh}"
          done

          # Copy branding
          if [ -d ../branding/grub ]; then
            mkdir -p config/includes.binary/boot/grub/themes/ollamalinux/
            cp ../branding/grub/* config/includes.binary/boot/grub/themes/ollamalinux/ 2>/dev/null || true
          fi

          if [ -d ../branding/plymouth ]; then
            mkdir -p config/includes.chroot/usr/share/plymouth/themes/ollamalinux/
            cp -r ../branding/plymouth/* config/includes.chroot/usr/share/plymouth/themes/ollamalinux/ 2>/dev/null || true
          fi

          # Ensure hooks are executable (already in config/hooks/ for live-build 4.x)
          chmod +x config/hooks/*.hook.chroot 2>/dev/null || true

          # Remove desktop packages for server build
          rm -f config/package-lists/desktop.list.chroot

      - name: Build Server ISO
        run: |
          cd live-build
          chmod +x auto/*

          # Patch lb_binary_syslinux to fix isolinux file paths
          # The script references /root/isolinux/ but files are in standard package locations
          LB_SYSLINUX=$(find /usr/lib/live/build/ -name '*syslinux*' -type f 2>/dev/null | head -5)
          echo "=== live-build syslinux scripts ==="
          echo "$LB_SYSLINUX"
          for script in $LB_SYSLINUX; do
            echo "--- $script ---"
            grep -n 'isolinux\|/root/' "$script" 2>/dev/null || true
          done

          # Patch: replace /root/isolinux/ references with standard package paths
          for script in $LB_SYSLINUX; do
            if grep -q '/root/isolinux/isolinux.bin' "$script" 2>/dev/null; then
              echo "Patching $script..."
              sudo sed -i 's|/root/isolinux/isolinux.bin|/usr/lib/ISOLINUX/isolinux.bin|g' "$script"
              sudo sed -i 's|/root/isolinux/vesamenu.c32|/usr/lib/syslinux/modules/bios/vesamenu.c32|g' "$script"
              sudo sed -i 's|/root/isolinux/|/usr/lib/syslinux/modules/bios/|g' "$script"
              echo "Patched successfully"
            fi
          done

          # Also provide files in all possible locations as fallback
          sudo mkdir -p /root/isolinux
          sudo cp /usr/lib/ISOLINUX/isolinux.bin /root/isolinux/ 2>/dev/null || true
          sudo cp /usr/lib/syslinux/modules/bios/*.c32 /root/isolinux/ 2>/dev/null || true
          # Include in chroot overlay for binary chroot access
          mkdir -p config/includes.chroot/root/isolinux
          cp /usr/lib/ISOLINUX/isolinux.bin config/includes.chroot/root/isolinux/ 2>/dev/null || true
          cp /usr/lib/syslinux/modules/bios/*.c32 config/includes.chroot/root/isolinux/ 2>/dev/null || true
          echo "=== isolinux files ==="
          ls -la /root/isolinux/ config/includes.chroot/root/isolinux/

          sudo lb config
          sudo lb build 2>&1 || true

          # Verify ISO was produced
          ls -lh *.iso binary.hybrid.iso 2>/dev/null || { echo "ERROR: No ISO produced"; exit 1; }

      - name: Collect output
        run: |
          mkdir -p output
          VERSION=$(cat VERSION)
          mv live-build/*.iso output/ollamalinux-${VERSION}-server-amd64.iso 2>/dev/null || \
            mv live-build/binary.hybrid.iso output/ollamalinux-${VERSION}-server-amd64.iso 2>/dev/null || true
          cd output && sha256sum *.iso > SHA256SUMS 2>/dev/null || true
          ls -lh output/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollamalinux-server-iso
          path: |
            output/*.iso
            output/SHA256SUMS
          retention-days: 30

  build-desktop:
    if: >-
      github.event.inputs.flavor == 'desktop' ||
      github.event.inputs.flavor == 'both'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed \
            shim-signed mtools dosfstools squashfs-tools syslinux \
            syslinux-utils isolinux genisoimage

      - name: Prepare build
        run: |
          cd live-build

          mkdir -p config/includes.chroot/usr/local/bin/lib
          cp -r ../scripts/*.sh config/includes.chroot/usr/local/bin/ 2>/dev/null || true
          cp -r ../scripts/lib/*.sh config/includes.chroot/usr/local/bin/lib/ 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/*.sh 2>/dev/null || true
          chmod +x config/includes.chroot/usr/local/bin/lib/*.sh 2>/dev/null || true

          for f in config/includes.chroot/usr/local/bin/*.sh; do
            [ -f "$f" ] && mv "$f" "${f%.sh}"
          done

          if [ -d ../branding/grub ]; then
            mkdir -p config/includes.binary/boot/grub/themes/ollamalinux/
            cp ../branding/grub/* config/includes.binary/boot/grub/themes/ollamalinux/ 2>/dev/null || true
          fi

          if [ -d ../branding/plymouth ]; then
            mkdir -p config/includes.chroot/usr/share/plymouth/themes/ollamalinux/
            cp -r ../branding/plymouth/* config/includes.chroot/usr/share/plymouth/themes/ollamalinux/ 2>/dev/null || true
          fi

          # Ensure hooks are executable (already in config/hooks/ for live-build 4.x)
          chmod +x config/hooks/*.hook.chroot 2>/dev/null || true

          # Keep desktop packages for desktop build

      - name: Build Desktop ISO
        run: |
          cd live-build
          chmod +x auto/*

          sudo lb config
          sudo lb build 2>&1 || true

          # Verify ISO was produced
          ls -lh *.iso binary.hybrid.iso 2>/dev/null || { echo "ERROR: No ISO produced"; exit 1; }

      - name: Collect output
        run: |
          mkdir -p output
          VERSION=$(cat VERSION)
          mv live-build/*.iso output/ollamalinux-${VERSION}-desktop-amd64.iso 2>/dev/null || \
            mv live-build/binary.hybrid.iso output/ollamalinux-${VERSION}-desktop-amd64.iso 2>/dev/null || true
          cd output && sha256sum *.iso > SHA256SUMS 2>/dev/null || true
          ls -lh output/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollamalinux-desktop-iso
          path: |
            output/*.iso
            output/SHA256SUMS
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.iso
            artifacts/**/SHA256SUMS
          generate_release_notes: true
